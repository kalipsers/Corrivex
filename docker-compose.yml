name: corrivex

# Production compose. Pulls the published Corrivex image from Docker Hub —
# no Go toolchain or source tree required on the host beyond this file.
#
# Quickstart:
#   1. cp .env.example .env  (and fill in the credentials)
#   2. docker compose pull
#   3. docker compose up -d
#
# Pin to a specific version with the CORRIVEX_IMAGE override, e.g.:
#   CORRIVEX_IMAGE=kalipserproit/corrivex:1.2.0 docker compose up -d
#
# To build the image from source instead (development), use
# docker-compose.build.yml.

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
      # MariaDB's time_zone=SYSTEM follows this container-level TZ, so
      # CURRENT_TIMESTAMP writes and reads match the Corrivex server's clock.
      TZ: ${TZ:-UTC}
    volumes:
      - corrivex_db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    image: ${CORRIVEX_IMAGE:-kalipserproit/corrivex:latest}
    restart: unless-stopped
    pull_policy: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      CORRIVEX_ADDR: ":8484"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REQUIRE_DOMAIN_CHECK: "true"
      HISTORY_KEEP: "50"
      API_SECRET: ${API_SECRET:-}
      # Sets the Go process's local timezone — time.Now() and the formatted
      # timestamps in reports + logs line up with the DB.
      TZ: ${TZ:-UTC}
      # CVE scanner — set CVE_SCAN_ENABLED=false for air-gapped deployments.
      CVE_SCAN_ENABLED: ${CVE_SCAN_ENABLED:-true}
      NVD_API_KEY: ${NVD_API_KEY:-}
    ports:
      - "8484:8484"

volumes:
  corrivex_db:
