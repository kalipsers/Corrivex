name: Release

# Triggered when you push a vX.Y.Z tag. Builds every binary, packages a
# Windows zip, creates a GitHub Release with all artifacts attached, and
# pushes a Docker image to Docker Hub.
#
# REQUIRED REPO SECRETS (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME   the Docker Hub account that owns the image repo
#   DOCKERHUB_TOKEN      a Docker Hub access token (https://hub.docker.com/settings/security)
#
# REQUIRED REPO VARIABLE (Settings → Secrets and variables → Actions → Variables):
#   DOCKERHUB_REPO       optional; defaults to "<DOCKERHUB_USERNAME>/corrivex"
#
# To cut a release:
#   1. Run scripts/bump-version.sh X.Y.Z
#   2. Add a changelog entry to versioning.md
#   3. git commit -am "release X.Y.Z" && git push
#   4. git tag vX.Y.Z && git push origin vX.Y.Z
# This workflow takes over from there.

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write   # to create the GitHub Release
  packages: write

jobs:
  build:
    name: build binaries + publish GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # Verify the tag matches the version in source. Catches the
      # "forgot to bump version.go before tagging" mistake early.
      - name: Resolve + verify version
        id: ver
        run: |
          VERSION=$(awk -F'"' '/^var Version =/{print $2; exit}' internal/version/version.go)
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag v${TAG_VERSION} does not match internal/version/version.go (${VERSION})"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Corrivex v$VERSION"

      # Generate the .syso so Windows file Properties → Details show version.
      - name: Generate Windows VersionInfo .syso
        run: |
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1 \
            -64 -o cmd/server/resource_amd64.syso cmd/server/versioninfo.json
          go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.4.1 \
            -64 -o cmd/agent/resource_amd64.syso cmd/agent/versioninfo.json

      - name: Build all binaries
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/markov/corrivex/internal/version.Version=${VERSION}"
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o dist/corrivex-server     ./cmd/server
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o dist/corrivex-server.exe ./cmd/server
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags="$LDFLAGS" -o dist/corrivex-agent.exe  ./cmd/agent

      - name: Package Windows release zip
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist/_stage
          cp dist/corrivex-server.exe dist/_stage/
          cp dist/corrivex-agent.exe  dist/_stage/
          cp deploy/install-server.ps1 dist/_stage/
          cp README.md      dist/_stage/README.md
          cp versioning.md  dist/_stage/versioning.md
          cp LICENSE        dist/_stage/LICENSE
          (cd dist/_stage && zip -r "../corrivex-windows-${VERSION}.zip" ./*)
          rm -rf dist/_stage

      - name: SHA256 checksums
        run: cd dist && sha256sum corrivex-server corrivex-server.exe corrivex-agent.exe corrivex-windows-*.zip > SHA256SUMS

      # Pull the section for this version out of versioning.md so the GitHub
      # Release body matches the changelog. Falls back to a generic line.
      - name: Extract changelog section
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            /^### / {
              if (active) exit
              if (index($0, ver) > 0) { active = 1; next }
            }
            active { print }
          ' versioning.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${VERSION}." > release_notes.md
          fi
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Corrivex v${{ steps.ver.outputs.version }}
          body_path: release_notes.md
          fail_on_unmatched_files: true
          files: |
            dist/corrivex-server
            dist/corrivex-server.exe
            dist/corrivex-agent.exe
            dist/corrivex-windows-${{ steps.ver.outputs.version }}.zip
            dist/SHA256SUMS

  docker:
    name: build + push Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Resolve repo name
        id: repo
        run: |
          REPO="${{ vars.DOCKERHUB_REPO }}"
          if [ -z "$REPO" ]; then REPO="${{ secrets.DOCKERHUB_USERNAME }}/corrivex"; fi
          echo "repo=$REPO" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.repo.outputs.repo }}:${{ needs.build.outputs.version }}
            ${{ steps.repo.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # cleaner Docker Hub UI; flip to true if you want SLSA attestations

      # Refresh the Docker Hub repo "Overview" tab from DOCKERHUB.md so anyone
      # landing on the image page sees the latest quickstart + compose snippet.
      # Requires the Docker Hub token to have at least "Repository: Read &
      # Write" scope on the target repo (account-wide tokens work fine).
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ steps.repo.outputs.repo }}
          short-description: "Centralised winget + Windows Update orchestration for Windows endpoints"
          readme-filepath: ./DOCKERHUB.md
