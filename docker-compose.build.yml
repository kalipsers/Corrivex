name: corrivex

# Development compose. Builds the Corrivex image locally from source instead
# of pulling the published one. Same project name (`corrivex`) and same
# volume (`corrivex_db`) as docker-compose.yml so you can switch between
# pull and build without losing data.
#
# Use this when:
#   - iterating on the server code
#   - testing unreleased changes before tagging
#   - running on an air-gapped host with no Docker Hub access
#
# Build + run:
#   docker compose -f docker-compose.build.yml up -d --build
#
# Switch back to the published image:
#   docker compose -f docker-compose.build.yml down
#   docker compose pull
#   docker compose up -d

services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASS}
      TZ: ${TZ:-UTC}
    volumes:
      - corrivex_db:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: corrivex-server:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      CORRIVEX_ADDR: ":8484"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REQUIRE_DOMAIN_CHECK: "true"
      HISTORY_KEEP: "50"
      API_SECRET: ${API_SECRET:-}
      TZ: ${TZ:-UTC}
    ports:
      - "8484:8484"

volumes:
  corrivex_db:
